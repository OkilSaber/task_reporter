<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur" />
      <feFlood flood-color="#a855f7" flood-opacity="0.3" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded Square Background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#mainGradient)" />
  
  <!-- Abstract "Check" + "Clock" fusion -->
  <g filter="url(#glow)">
    <!-- Outer Circle (Clock ring) -->
    <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.3" />
    
    <!-- Large Stylized Checkmark -->
    <path d="M160 260 L230 330 L360 190" 
          fill="none" 
          stroke="white" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Modern Dots / Nodes -->
    <circle cx="160" cy="260" r="12" fill="white" />
    <circle cx="360" cy="190" r="12" fill="white" />
    <circle cx="230" cy="330" r="12" fill="white" />
  </g>
  
  <!-- Glassy Reflection -->
  <path d="M100 60 Q256 120 412 60" fill="none" stroke="white" stroke-width="4" opacity="0.2" stroke-linecap="round" />
</svg>
